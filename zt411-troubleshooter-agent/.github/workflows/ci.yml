name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, main]

# ---------------------------------------------------------------------------
# Python agent — lint + unit tests (no DB required)
# ---------------------------------------------------------------------------
jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.14']

    defaults:
      run:
        working-directory: ./zt411-troubleshooter-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        # pyproject.toml is at repo root; poetry resolves correctly
        run: cd .. && poetry install --no-interaction

      - name: Lint
        run: make lint

      - name: Unit + integration tests (in-memory store)
        run: make test
        env:
          USE_DB: 'false'

  # ---------------------------------------------------------------------------
  # Python agent — integration tests against real PostgreSQL
  # ---------------------------------------------------------------------------
  python-db:
    name: Python + PostgreSQL
    runs-on: ubuntu-latest
    needs: python

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zt411
          POSTGRES_USER: zt411
          POSTGRES_PASSWORD: zt411
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zt411"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: ./zt411-troubleshooter-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: cd .. && poetry install --no-interaction

      - name: Run tests with PostgreSQL
        run: make test
        env:
          USE_DB: 'true'
          DATABASE_URL: 'postgresql://zt411:zt411@localhost:5432/zt411'

  # ---------------------------------------------------------------------------
  # Frontend — type-check + build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: 'http://localhost:8000'

  # ---------------------------------------------------------------------------
  # Docker — verify images build
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [python, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t zt411-api:ci ./zt411-troubleshooter-agent

      - name: Build frontend image
        run: docker build -t zt411-frontend:ci ./frontend
